<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Check-in Barca · Corsica Experience</title>
  <link rel="stylesheet" href="styles.css?v=20260525i" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Inter:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
    body { background: var(--ocean); color: #fff; min-height: 100vh; }
    .ci-wrap { max-width: 720px; margin: 0 auto; padding: 32px 20px 80px; }
    .ci-header { text-align: center; padding: 40px 0 32px; }
    .ci-header .label { font-size: .7rem; letter-spacing: .18em; text-transform: uppercase; color: var(--turq); font-weight: 600; display: block; margin-bottom: 10px; }
    .ci-header h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.4rem; font-weight: 300; margin-bottom: 8px; }
    .ci-header p { font-size: .9rem; color: rgba(255,255,255,.6); }

    /* Boat selector */
    .boat-select { display: flex; gap: 12px; margin-bottom: 36px; flex-wrap: wrap; }
    .boat-btn { flex: 1; min-width: 140px; padding: 14px 16px; background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.15); border-radius: 12px; color: rgba(255,255,255,.7); font-size: .88rem; cursor: pointer; text-align: center; transition: all .2s; }
    .boat-btn:hover { background: rgba(255,255,255,.12); color: #fff; }
    .boat-btn.active { background: var(--turq); border-color: var(--turq); color: #fff; font-weight: 600; }

    /* Progress bar */
    .ci-progress { background: rgba(255,255,255,.08); border-radius: 20px; height: 6px; margin-bottom: 8px; overflow: hidden; }
    .ci-progress-fill { height: 100%; background: var(--turq); border-radius: 20px; transition: width .3s ease; }
    .ci-progress-label { font-size: .78rem; color: rgba(255,255,255,.5); margin-bottom: 28px; }

    /* Sections */
    .ci-section { margin-bottom: 20px; border-radius: 16px; overflow: hidden; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.1); }
    .ci-section-header { display: flex; align-items: center; gap: 12px; padding: 16px 20px; background: rgba(255,255,255,.05); cursor: pointer; user-select: none; }
    .ci-section-header .icon { font-size: 1.3rem; }
    .ci-section-header .title { font-weight: 600; font-size: .95rem; flex: 1; }
    .ci-section-header .count { font-size: .78rem; color: rgba(255,255,255,.45); }
    .ci-section-header .arrow { font-size: .8rem; color: rgba(255,255,255,.35); transition: transform .2s; }
    .ci-section.open .arrow { transform: rotate(90deg); }
    .ci-section-body { display: none; padding: 8px 0; }
    .ci-section.open .ci-section-body { display: block; }

    /* Items */
    .ci-item { display: flex; align-items: center; gap: 14px; padding: 13px 20px; border-bottom: 1px solid rgba(255,255,255,.05); cursor: pointer; transition: background .15s; }
    .ci-item:last-child { border-bottom: none; }
    .ci-item:hover { background: rgba(255,255,255,.04); }
    .ci-item input[type=checkbox] { width: 20px; height: 20px; accent-color: var(--turq); cursor: pointer; flex-shrink: 0; }
    .ci-item label { flex: 1; font-size: .88rem; color: rgba(255,255,255,.8); cursor: pointer; line-height: 1.4; }
    .ci-item.checked label { color: rgba(255,255,255,.4); text-decoration: line-through; }
    .ci-item .note { font-size: .75rem; color: rgba(255,255,255,.35); display: block; margin-top: 2px; }

    /* Actions */
    .ci-actions { display: flex; gap: 12px; margin-top: 28px; flex-wrap: wrap; }
    .ci-btn { flex: 1; min-width: 160px; padding: 14px 20px; border: none; border-radius: 12px; font-size: .9rem; font-weight: 600; cursor: pointer; transition: all .2s; }
    .ci-btn-reset { background: rgba(255,255,255,.08); color: rgba(255,255,255,.7); border: 1px solid rgba(255,255,255,.15); }
    .ci-btn-reset:hover { background: rgba(255,255,255,.14); color: #fff; }
    .ci-btn-print { background: var(--turq); color: #fff; }
    .ci-btn-print:hover { background: #17898a; }

    /* Lock screen */
    .ci-lock { text-align: center; padding: 60px 20px; }
    .ci-lock .lock-icon { font-size: 3rem; margin-bottom: 16px; }
    .ci-lock p { color: rgba(255,255,255,.6); font-size: .9rem; margin-bottom: 24px; }
    .ci-lock input { display: block; margin: 0 auto 16px; padding: 12px 20px; border-radius: 10px; border: 1px solid rgba(255,255,255,.2); background: rgba(255,255,255,.08); color: #fff; font-size: 1rem; width: 260px; text-align: center; outline: none; }
    .ci-lock input::placeholder { color: rgba(255,255,255,.35); }
    .ci-lock button { padding: 12px 32px; background: var(--turq); color: #fff; border: none; border-radius: 10px; font-size: .95rem; font-weight: 600; cursor: pointer; }
    .ci-lock .err { color: #f87171; font-size: .85rem; margin-top: 10px; display: none; }

    /* Print styles */
    @media print {
      body { background: #fff !important; color: #111 !important; }
      .ci-wrap { padding: 10mm 12mm !important; max-width: 100% !important; }
      .ci-header { padding: 0 0 16px !important; }
      .ci-header h1 { color: #0b3c5d !important; font-size: 1.8rem !important; }
      .ci-header p, .ci-header .label { color: #555 !important; }
      .boat-select, .ci-actions, .ci-lock { display: none !important; }
      .ci-progress, .ci-progress-label { display: none !important; }
      .ci-section { border: 1px solid #c0cdd8 !important; background: #fff !important; margin-bottom: 12px !important; break-inside: avoid; }
      .ci-section-body { display: block !important; }
      .ci-section-header { background: #e8f0f7 !important; cursor: default; }
      .ci-section-header .title { color: #0b3c5d !important; }
      .ci-section-header .arrow { display: none; }
      .ci-item { border-bottom: 1px solid #eee !important; padding: 9px 16px !important; }
      .ci-item label { color: #333 !important; font-size: .85rem !important; }
      .ci-item.checked label { color: #aaa !important; }
      .ci-item input[type=checkbox] { accent-color: #1ca7a8; }
      .print-meta { display: block !important; }
    }
    .print-meta { display: none; font-size: .75rem; color: #999; text-align: right; margin-top: 20px; }
  </style>
</head>
<body>

<nav class="nav scrolled" id="nav">
  <div class="nav-inner">
    <a class="nav-logo" href="index.html">
      <span class="logo-icon">—</span>
      <span class="logo-text">Corsica Experience</span>
    </a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="lagoon.html">Lagoon 40</a>
      <a href="oceanis.html">Oceanis 48</a>
    </div>
  </div>
</nav>

<div class="ci-wrap">
  <div class="ci-header">
    <span class="label">Skipper Tool</span>
    <h1>Check-in Barca</h1>
    <p>Verifica pre-partenza — spunta ogni voce prima di salpare</p>
  </div>

  <!-- Lock screen -->
  <div id="lockScreen" class="ci-lock">
    <div class="lock-icon">🔒</div>
    <p>Inserisci la password skipper per accedere alla checklist</p>
    <input type="password" id="pwdInput" placeholder="Password" onkeydown="if(event.key==='Enter')unlock()" />
    <button onclick="unlock()">Accedi</button>
    <div class="err" id="lockErr">Password errata. Riprova.</div>
  </div>

  <!-- Main content (hidden until unlocked) -->
  <div id="mainContent" style="display:none">

    <!-- Boat selector -->
    <div class="boat-select">
      <button class="boat-btn active" id="btn-lagoon" onclick="selectBoatCI('lagoon')">⛵ Lagoon 40</button>
      <button class="boat-btn" id="btn-oceanis" onclick="selectBoatCI('oceanis')">⛵ Oceanis 48</button>
    </div>

    <!-- Progress -->
    <div class="ci-progress"><div class="ci-progress-fill" id="progressFill"></div></div>
    <div class="ci-progress-label" id="progressLabel">0 / 0 voci completate</div>

    <!-- Checklist -->
    <div id="checklistContainer"></div>

    <div class="print-meta" id="printMeta"></div>

    <div class="ci-actions">
      <button class="ci-btn ci-btn-reset" onclick="resetChecklist()">↺ Azzera tutto</button>
      <button class="ci-btn ci-btn-print" onclick="printChecklist()">🖨️ Stampa Check-in</button>
    </div>
  </div>
</div>

<script>
const ADMIN_PWD = 'Skipper2026';
let currentBoat = 'lagoon';

const SECTIONS_BASE = [
  {
    icon: '🚨', title: 'HIGH FIVE — Priorità Assoluta',
    note: 'Salpa ancora, Sentine, Batterie, Motore, Timoneria',
    items: [
      { id: 'hf1', text: 'Salpa ancora', note: 'Funzionamento verricello, calare e salpare 10 mt' },
      { id: 'hf2', text: 'Sentina', note: 'Controllo se c\'è acqua, pompa elettrica e manuale funzionanti' },
      { id: 'hf3', text: 'Batterie', note: 'Test tensione servizi e motore, verifica ricarica' },
      { id: 'hf4', text: 'Motore', note: 'Accensione, marce, scarico acqua, fumi, olio, cinghia' },
      { id: 'hf5', text: 'Timoneria', note: 'Fluidità, gioco, autopilota, barra di rispetto' },
    ]
  },
  {
    icon: '⚓', title: 'Check-in in Coperta',
    items: [
      { id: 'cop1', text: 'Timone', note: 'Fluidità e gioco, catene/cavi/pistone autopilota. Timone di rispetto: localizzare perno' },
      { id: 'cop2', text: 'Ancora principale / Salpa ancora', note: 'Analisi visiva catena e campana. Magnetotermico, dimensione catena, grillo/giunto, sagolino, verricello elettrico e frizione manuale' },
      { id: 'cop3', text: 'Esterno barca — opera morta', note: 'Tuga, pulpiti, battagliola, falchetta: botte, crepe, delaminazione, ruggine' },
      { id: 'cop4', text: 'Opera viva', note: 'Prima occasione: bulbo, timone, elica' },
      { id: 'cop5', text: 'Albero, boma, crocette, sartie, paterazzi', note: 'Rettilineità, ammaccature, piede d\'albero. Sartie: tensione bilanciata, arridatoi, crocette' },
      { id: 'cop6', text: 'Genoa e Randa', note: 'Apertura/chiusura avvolgifiocco e avvolgiranda, usura, stecche, lazy bag e lazy jack' },
      { id: 'cop7', text: 'Scotte e drizze', note: 'Lunghezza e usura' },
      { id: 'cop8', text: 'Bozzelli, carrelli e stopper', note: 'Stato e usura' },
      { id: 'cop9', text: 'Steriggi', note: 'Guarnizioni e maniglie di chiusura' },
      { id: 'cop10', text: 'Winch e maniglie', note: 'Numero e stato (almeno 2 + 1 rispetto)' },
      { id: 'cop11', text: 'Luci di navigazione', note: 'Via (rosso/verde prua, engine light albero, coronamento poppa). Deck light e testa d\'albero' },
      { id: 'cop12', text: 'Cime e parabordi', note: 'Ormeggio: 1 da 50m, 2 da 20/25m, altre varie. Parabordi: minimo 6' },
      { id: 'cop13', text: 'Dotazioni sicurezza coperta', note: 'Riflettore radar, salvagente anulare + cimino, boetta luminosa, pompa sentina manuale, estintore plancia' },
      { id: 'cop14', text: 'Zattera di salvataggio', note: 'Posizione, n° passeggeri, data scadenza/revisione, stato generale, sagolino innesco libero' },
      { id: 'cop15', text: 'Tender e fuoribordo', note: 'Stato, remi, cimino galleggiante. Motore: carburante, olio, elica, chiavetta, kill-cord' },
      { id: 'cop16', text: 'Ancora di rispetto', note: 'Localizzazione, catena e cima' },
      { id: 'cop17', text: 'Taniche e liquidi motore', note: 'Acqua, gasolio, mix fuoribordo, olio, liquido raffreddamento' },
      { id: 'cop18', text: 'Strumenti navigazione pozzetto', note: 'Bussola, GPS, LOG, ecoscandaglio, indicatore vento, VHF, indicatori acqua e batterie' },
      { id: 'cop19', text: 'Barra di rispetto', note: 'Localizzare perno asse timone, prova funzionamento' },
      { id: 'cop20', text: 'Altre dotazioni', note: 'Ancora rispetto, bombola gas (principale + rispetto), cavo 220V, tubo acqua, tanica gasolio 20L, tanica fuoribordo, olio, lifeline, sassola, buiolo, spugna, ramazza' },
    ]
  },
  {
    icon: '🔧', title: 'Check-in Sotto Coperta — Motore',
    items: [
      { id: 'mot1', text: 'Batterie — analisi visiva', note: 'Pulite, asciutte, non ossidate. Test voltaggio con utenze staccate' },
      { id: 'mot2', text: 'Batterie — test carica', note: 'Fine giornata: ripetere test. Voltaggio variato molto = problema batteria' },
      { id: 'mot3', text: 'Motore — base', note: 'Accensione/spegnimento, marce, acceleratore, folle, effetto evolutivo' },
      { id: 'mot4', text: 'Motore — analisi visiva', note: 'Pulizia, vernice intatta (soprattutto attorno iniettori)' },
      { id: 'mot5', text: 'Motore — Water', note: 'Filtro acqua salata e livello liquido raffreddamento' },
      { id: 'mot6', text: 'Motore — Oil', note: 'Livello e colore olio motore' },
      { id: 'mot7', text: 'Motore — Belt', note: 'Stato e tensione cinghia di trasmissione' },
      { id: 'mot8', text: 'Motore — Bilge', note: 'Pulizia della sentina' },
      { id: 'mot9', text: 'Motore — Leaks', note: 'Corrosione, calcare o liquidi presenti?' },
      { id: 'mot10', text: 'Motore — Exhaust', note: 'Fumi motore e scarico acqua regolari' },
    ]
  },
  {
    icon: '🆘', title: 'Sicurezza Sotto Coperta',
    items: [
      { id: 'sic1', text: 'Sentina', note: 'Acqua presente (dolce o salata?), perdite/falle, pompa elettrica manuale/automatica, filtro, pompa manuale esterna' },
      { id: 'sic2', text: 'Giubbotti salvagente', note: 'N° (1 per imbarcato), localizzazione, stato, tipo (minimo 250N)' },
      { id: 'sic3', text: 'Cinture di sicurezza', note: 'Localizzazione e numero (consigliate almeno 4)' },
      { id: 'sic4', text: 'Estintori', note: 'Localizzazione, stato/validità, tipo, uso, numero (almeno 2 sotto: 1 carteggio, 1 sala macchine)' },
      { id: 'sic5', text: 'Fuochi / boette / razzi', note: 'Localizzazione, scadenza, numero (almeno 2 per tipo vicino carteggio)' },
      { id: 'sic6', text: 'Kit pronto soccorso', note: 'Cerotti, bende, laccio emostatico, disinfettante, antidolorifici, antibiotico' },
      { id: 'sic7', text: 'Cassetta attrezzi e spare parts', note: 'Martello, cacciaviti, pinza, chiavi, seghetto, nastro isolante, tappi turafalle, cinghie, girante, filtri, olio' },
      { id: 'sic8', text: 'EPIRB', note: 'Localizzazione e stato (obbligatorio oltre 50NM)' },
    ]
  },
  {
    icon: '⚡', title: 'Impianti e Strumenti',
    items: [
      { id: 'imp1', text: 'Quadro elettrico', note: 'Indicatori livelli carburante, acqua, batterie. Controllare tutti gli switch' },
      { id: 'imp2', text: 'Strumenti elettronici', note: 'GPS con carte aggiornate, stazione meteo, AIS e radar (se presenti)' },
      { id: 'imp3', text: 'VHF', note: 'Funzionamento, MMSI inserito, procedura MayDay DSC' },
      { id: 'imp4', text: 'GPS', note: 'Impostazione dati e accuratezza posizione porto su carta nautica' },
      { id: 'imp5', text: 'Bow thruster', note: 'Funzionamento e batterie dedicate (se presente)' },
      { id: 'imp6', text: 'Scarichi / acque', note: 'Acque bianche, dolci, salate. Pressione autoclave. WC funzionanti' },
      { id: 'imp7', text: 'Carena — primo bagno', note: 'Botte, graffi su opera viva, bulbo, timone, elica' },
      { id: 'imp8', text: 'Tender sotto coperta', note: 'Stato, tenuta pressione, remi, motore' },
    ]
  },
  {
    icon: '�', title: 'Documenti di Bordo',
    items: [
      { id: 'doc1', text: 'Licenza di navigazione (Call Sign)', note: 'Abilita navigazione — no visto periodico' },
      { id: 'doc2', text: 'Certificato di sicurezza', note: 'In corso di validità' },
      { id: 'doc3', text: 'Dichiarazione di potenza / certificato motore', note: '' },
      { id: 'doc4', text: 'Polizza assicurazione', note: 'Obbligatoria per tutti i motori, incluso tender' },
      { id: 'doc5', text: 'Licenza esercizio RTF (MMSI)', note: '' },
      { id: 'doc6', text: 'Certificato limitato RTF del comandante', note: '' },
      { id: 'doc7', text: 'Patente nautica in corso di validità', note: 'Se motore > 40 cv' },
      { id: 'doc8', text: 'Documenti identità equipaggio', note: 'Documento per ogni persona a bordo' },
      { id: 'doc9', text: 'Documenti nautici obbligatori', note: 'Portolani, elenco fari, carte nautiche, Carta 1111, avvisi ai naviganti' },
      { id: 'doc10', text: 'Manuale d\'uso imbarcazione', note: 'Consigliabile' },
    ]
  },
];

const CHECKLIST = {
  lagoon: { name: 'Lagoon 40', sections: SECTIONS_BASE },
  oceanis: { name: 'Beneteau Oceanis 48', sections: [] }
};
CHECKLIST.oceanis.sections = SECTIONS_BASE.map(s => ({
  ...s,
  items: s.items.map(it => ({ ...it, id: 'o_' + it.id }))
}));

function unlock() {
  const val = document.getElementById('pwdInput').value;
  if (val === ADMIN_PWD) {
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
    renderChecklist(currentBoat);
  } else {
    document.getElementById('lockErr').style.display = 'block';
  }
}

function selectBoatCI(boat) {
  currentBoat = boat;
  document.querySelectorAll('.boat-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + boat).classList.add('active');
  renderChecklist(boat);
}

function getSaved(boat) {
  try { return JSON.parse(localStorage.getItem('checkin_' + boat)) || {}; } catch(e) { return {}; }
}
function setSaved(boat, state) {
  localStorage.setItem('checkin_' + boat, JSON.stringify(state));
}

function renderChecklist(boat) {
  const data = CHECKLIST[boat];
  const saved = getSaved(boat);
  const container = document.getElementById('checklistContainer');
  container.innerHTML = '';

  data.sections.forEach((sec, si) => {
    const div = document.createElement('div');
    div.className = 'ci-section open';
    div.id = 'sec-' + si;

    const doneInSec = sec.items.filter(it => saved[it.id]).length;

    div.innerHTML = `
      <div class="ci-section-header" onclick="toggleSection('sec-${si}')">
        <span class="icon">${sec.icon}</span>
        <span class="title">${sec.title}</span>
        <span class="count">${doneInSec}/${sec.items.length}</span>
        <span class="arrow">▶</span>
      </div>
      <div class="ci-section-body">
        ${sec.items.map(it => `
          <div class="ci-item${saved[it.id] ? ' checked' : ''}" id="item-${it.id}" onclick="toggle('${it.id}','${boat}','sec-${si}')">
            <input type="checkbox" id="cb-${it.id}" ${saved[it.id] ? 'checked' : ''} onclick="event.stopPropagation();toggle('${it.id}','${boat}','sec-${si}')"/>
            <label for="cb-${it.id}">${it.text}${it.note ? `<span class="note">${it.note}</span>` : ''}</label>
          </div>`).join('')}
      </div>`;
    container.appendChild(div);
  });

  updateProgress(boat);
}

function toggle(id, boat, secId) {
  const saved = getSaved(boat);
  saved[id] = !saved[id];
  setSaved(boat, saved);
  const itemEl = document.getElementById('item-' + id);
  const cb = document.getElementById('cb-' + id);
  if (itemEl) itemEl.classList.toggle('checked', !!saved[id]);
  if (cb) cb.checked = !!saved[id];
  updateProgress(boat);
  // aggiorna contatore sezione
  const sec = document.getElementById(secId);
  if (sec) {
    const items = sec.querySelectorAll('.ci-item');
    const done = sec.querySelectorAll('.ci-item.checked').length;
    const countEl = sec.querySelector('.count');
    if (countEl) countEl.textContent = done + '/' + items.length;
  }
}

function toggleSection(id) {
  document.getElementById(id).classList.toggle('open');
}

function updateProgress(boat) {
  const data = CHECKLIST[boat];
  const saved = getSaved(boat);
  const total = data.sections.reduce((n, s) => n + s.items.length, 0);
  const done  = data.sections.reduce((n, s) => n + s.items.filter(it => saved[it.id]).length, 0);
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = done + ' / ' + total + ' voci completate (' + pct + '%)';
}

function resetChecklist() {
  if (!confirm('Azzerare tutte le spunte per questa barca?')) return;
  localStorage.removeItem('checkin_' + currentBoat);
  renderChecklist(currentBoat);
}

function printChecklist() {
  const boat = CHECKLIST[currentBoat];
  const now = new Date().toLocaleString('it-IT');
  document.getElementById('printMeta').textContent = 'Barca: ' + boat.name + '  ·  Stampato: ' + now + '  ·  Skipper: ___________________________';
  window.print();
}
</script>
</body>
</html>
